<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title></title>

<style>
body{
    margin:0;
    background:#f5f5f5;
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",Helvetica;
}

/* 主体 */
.main{
    text-align:center;
    margin-top:140px;
}

/* 灰字 */
.top-text{
    color:#c9c9c9;
    font-size:16px;
    margin-bottom:50px;
}

/* 圆形 */
.icon{
    width:90px;
    height:90px;
    background:#07c160;
    border-radius:50%;
    margin:0 auto;
    position:relative;
}

.icon:after{
    content:"";
    position:absolute;
    left:26px;
    top:28px;
    width:26px;
    height:16px;
    border-left:6px solid #fff;
    border-bottom:6px solid #fff;
    transform:rotate(-45deg);
}

/* 成功 */
.title{核销结果
    font-size:26px;
    font-weight:600;
    margin-top:20px;
    color:#333;
}

/* 车票 */
.desc{
    font-size:19px;
    color:#555;
    margin-top:10px;
}

/* 时间 */
.time{
    font-size:17px;
    color:#9e9e9e;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="main">
    <div class="top-text">核销结果</div>

    <div class="icon"></div>

    <div class="title">核销成功</div>
    <div class="desc">13元车票【次卡券】</div>
    <div class="time" id="time"></div>
</div>

<script>
function updateTime(){
    var now = new Date();

    var str = now.getFullYear() + "-" +
        String(now.getMonth()+1).padStart(2,'0') + "-" +
        String(now.getDate()).padStart(2,'0') + " " +
        String(now.getHours()).padStart(2,'0') + ":" +
        String(now.getMinutes()).padStart(2,'0') + ":" +
        String(now.getSeconds()).padStart(2,'0');

    document.getElementById("time").innerHTML = str;
}

updateTime();
setInterval(updateTime,1000);
</script>

</body>
</html>
